services:
  mongodb:
    image: mongo:7
    container_name: goplantatree-mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  app:
    image: ghcr.io/holgerengels/goplantatree:latest
    container_name: goplantatree-app
    depends_on:
      - mongodb
    env_file:
      - .env
    ports:
      - "3080:80"
    restart: unless-stopped

volumes:
  mongo-data:
