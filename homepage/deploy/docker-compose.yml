version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: goplantatree-mongo
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  backend:
    build: ../backend
    container_name: goplantatree-backend
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/goplantatree
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: goplantatree-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
