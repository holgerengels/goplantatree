services:
  mongodb:
    image: mongo:7
    container_name: goplantatree-mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ../backend
    container_name: goplantatree-backend
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - CONFIG_DIR=/app/config
    ports:
      - "3001:3001"
    volumes:
      - ./config:/app/config
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: goplantatree-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongo-data:
