<!DOCTYPE html>
<html>
<head>
<script type="module" src="https://cdn.jsdelivr.net/npm/@webawesome/components@3.0.0-alpha.5/dist/webawesome.loader.js"></script>
</head>
<body>
<wa-input id="myinput"></wa-input>
<script>
  const el = document.getElementById('myinput');
  el.addEventListener('wa-input', (e) => console.log('wa-input fired', e.target.value));
  el.addEventListener('input', (e) => console.log('input fired', e.target.value));
</script>
</body>
</html>
